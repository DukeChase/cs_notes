<style>
/* 调整侧边栏宽度以适应中文内容 */
@media (min-width: 50rem) {
  .side-bar {
    width: 264px !important;
    min-width: 264px !important;
  }
  .main {
    margin-left: 264px !important;
    max-width: calc(100% - 264px) !important;
  }
}
@media (min-width: 66.5rem) {
  .side-bar {
    width: 264px !important;
    min-width: 264px !important;
  }
  .main {
    margin-left: 264px !important;
    max-width: calc(100% - 264px) !important;
  }
}

/* 调整站点标题 */
.site-title {
  font-size: 1.1rem !important;
  line-height: 1.2 !important;
}

/* 导航栏文字不换行，显示省略号 */
.nav-list .nav-list-item .nav-list-link {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 调整导航栏层级缩进 */
.nav-list .nav-list-item > .nav-list {
  padding-left: 0.5rem;
}

/* 默认收起子导航 */
.nav-list .nav-list-item > .nav-list {
  display: none;
}

/* 展开状态 */
.nav-list .nav-list-item.active-parent > .nav-list {
  display: block;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // 获取所有有子导航的项
  const parentItems = document.querySelectorAll('.nav-list-item');

  parentItems.forEach(function(item) {
    const childList = item.querySelector(':scope > .nav-list');
    const link = item.querySelector(':scope > .nav-list-link');
    const expander = item.querySelector(':scope > .nav-list-expander');

    if (childList) {
      // 显示展开箭头
      if (expander) {
        expander.style.display = '';
      }

      // 点击链接或箭头切换展开/收起
      const toggleTarget = expander || link;
      toggleTarget.addEventListener('click', function(e) {
        e.preventDefault();

        // 收起其他所有已展开的项
        document.querySelectorAll('.nav-list-item.active-parent').forEach(function(activeItem) {
          if (activeItem !== item) {
            activeItem.classList.remove('active-parent');
          }
        });

        // 切换当前项
        item.classList.toggle('active-parent');
      });
    }
  });

  // 拦截导航链接点击（AJAX加载内容）
  document.querySelector('.side-bar').addEventListener('click', function(e) {
    const link = e.target.closest('.nav-list-link');
    if (!link) return;

    // 如果点击的是有子导航的父链接，不跳转
    const parentItem = link.closest('.nav-list-item');
    if (parentItem && parentItem.querySelector(':scope > .nav-list')) {
      return;
    }

    e.preventDefault();
    const href = link.getAttribute('href');

    // 高亮当前链接
    document.querySelectorAll('.nav-list-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');

    // 加载内容
    loadContent(href);

    // 更新浏览器地址栏
    history.pushState({ path: href }, '', href);
  });

  // 处理浏览器前进/后退
  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.path) {
      loadContent(e.state.path);
    }
  });

  function loadContent(url) {
    fetch(url)
      .then(response => response.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const newMain = doc.querySelector('.main-content');
        const currentMain = document.querySelector('.main-content');

        if (newMain && currentMain) {
          currentMain.innerHTML = newMain.innerHTML;
          window.scrollTo(0, 0);
        }
      })
      .catch(err => {
        console.error('加载失败:', err);
        window.location.href = url;
      });
  }
});
</script>
