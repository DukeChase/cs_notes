# ============================================================
# CS Notes - Nginx 安全加固配置（子路径部署版）
# 适用场景：Quartz 4.0 静态站点，baseUrl 保持 "/cs_notes/"
# 部署路径：将此文件复制到 /etc/nginx/sites-available/cs-notes
#           然后 ln -s /etc/nginx/sites-available/cs-notes /etc/nginx/sites-enabled/
#
# 与 nginx.conf 的区别：
#   - 站点部署在 /cs_notes/ 子路径下
#   - root 指向 /var/www/cs-notes（目录下有 cs_notes/ 子目录）
#   - SPA fallback 回退到 /cs_notes/index.html
#   - 静态资源路径前缀为 /cs_notes/
#   - 可与其他站点共存于同一域名
# ============================================================

# -------------------- 限流区域定义 --------------------
# 需在 /etc/nginx/nginx.conf 的 http {} 块中添加：
#
# limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    # -------------------- 监听与域名 --------------------
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # 替换为你的域名或服务器 IP

    # HTTP 全部重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    # -------------------- 监听与 SSL --------------------
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;  # 替换为你的域名或服务器 IP

    # SSL 证书路径（使用 Let's Encrypt，通过 setup-ssl.sh 自动配置）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # -------------------- SSL 加密配置 --------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------- 安全响应头 --------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP：子路径部署时 base-uri 需包含 /cs_notes/
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self' /cs_notes/; form-action 'self'" always;

    # -------------------- 隐藏版本号 --------------------
    server_tokens off;

    # -------------------- 日志 --------------------
    access_log /var/log/nginx/cs-notes-access.log;
    error_log  /var/log/nginx/cs-notes-error.log;

    # -------------------- 根目录 --------------------
    # 子路径部署：文件放在 /var/www/cs-notes/cs_notes/ 下
    # 即 public/ 目录的内容 rsync 到 /var/www/cs-notes/cs_notes/
    root /var/www/cs-notes;

    # -------------------- Gzip 压缩 --------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/manifest+json
        application/vnd.ms-fontobject
        font/opentype
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/cache-manifest
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # -------------------- 限流 --------------------
    limit_req zone=general burst=20 nodelay;
    limit_conn conn_limit 20;

    # -------------------- 敏感路径访问控制 --------------------
    location ~ /\.git {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # -------------------- 根路径默认页（可选） --------------------
    # 如果服务器上还有其他内容，根路径可放一个跳转页
    location = / {
        return 301 /cs_notes/;
    }

    # -------------------- CS Notes 子路径 --------------------
    location /cs_notes/ {
        # SPA 路由支持：回退到 /cs_notes/index.html
        try_files $uri $uri/ /cs_notes/index.html;

        # 考试资料保护（可选，取消注释启用）
        # 以下仅对 /cs_notes/sys-analyst/ 和 /cs_notes/sys-architect/ 生效
    }

    # -------------------- 考试资料保护（可选） --------------------
    # 方案一：IP 白名单
    # location ^~ /cs_notes/sys-analyst/ {
    #     allow 1.2.3.4;
    #     allow 192.168.0.0/16;
    #     deny all;
    #     try_files $uri $uri/ /cs_notes/index.html;
    # }
    #
    # location ^~ /cs_notes/sys-architect/ {
    #     allow 1.2.3.4;
    #     allow 192.168.0.0/16;
    #     deny all;
    #     try_files $uri $uri/ /cs_notes/index.html;
    # }

    # 方案二：HTTP Basic Auth
    # 需先创建密码文件：sudo htpasswd -c /etc/nginx/.htpasswd csadmin
    # location ^~ /cs_notes/sys-analyst/ {
    #     auth_basic "Restricted Area";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     try_files $uri $uri/ /cs_notes/index.html;
    # }
    #
    # location ^~ /cs_notes/sys-architect/ {
    #     auth_basic "Restricted Area";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     try_files $uri $uri/ /cs_notes/index.html;
    # }

    # -------------------- 静态资源缓存 --------------------
    location /cs_notes/ {
        # 对带 hash 的静态资源设置长缓存
        location ~* /cs_notes/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            limit_req zone=static burst=50 nodelay;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }
    }

    # -------------------- 防盗链（可选） --------------------
    location /cs_notes/ {
        location ~* /cs_notes/.*\.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            valid_referers none blocked server_names *.your-domain.com your-domain.com;
            if ($invalid_referer) {
                return 403;
            }
            try_files $uri =404;
        }
    }

    # -------------------- robots.txt 和 sitemap --------------------
    location = /cs_notes/robots.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    location = /cs_notes/sitemap.xml {
        default_type application/xml;
        try_files $uri =404;
    }

    # -------------------- RSS Feed --------------------
    location = /cs_notes/index.xml {
        default_type application/xml;
        try_files $uri =404;
    }

    # -------------------- 404 页面 --------------------
    error_page 404 /cs_notes/404.html;
    location = /cs_notes/404.html {
        internal;
        try_files $uri /cs_notes/index.html;
    }

    # -------------------- 禁止目录列表 --------------------
    autoindex off;
}
