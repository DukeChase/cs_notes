# ============================================================
# CS Notes - Nginx 安全加固配置（根路径部署版）
# 适用场景：Quartz 4.0 静态站点，baseUrl 改为 "/"
# 部署路径：将此文件复制到 /etc/nginx/sites-available/cs-notes
#           然后 ln -s /etc/nginx/sites-available/cs-notes /etc/nginx/sites-enabled/
# ============================================================

# -------------------- 限流区域定义 --------------------
# 放在 http 块中，此处以独立文件形式给出，需在 /etc/nginx/nginx.conf 的 http 块中引入
# 或直接将以下内容放入 nginx.conf 的 http {} 块内：
#
# limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# -------------------- 上游定义（可选） --------------------
# 如果后续需要反向代理后端服务，可在此定义

server {
    # -------------------- 监听与域名 --------------------
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # 替换为你的域名或服务器 IP

    # HTTP 全部重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    # -------------------- 监听与 SSL --------------------
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;  # 替换为你的域名或服务器 IP

    # SSL 证书路径（使用 Let's Encrypt，通过 setup-ssl.sh 自动配置）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # -------------------- SSL 加密配置 --------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;  # TLS 1.3 下推荐 off，让客户端选择
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling（需证书支持）
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------- 安全响应头 --------------------
    # HSTS：强制 HTTPS，有效期 1 年，包含子域名
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 禁止嵌入 iframe，防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;

    # XSS 防护（旧浏览器兼容）
    add_header X-XSS-Protection "1; mode=block" always;

    # 控制 Referer 泄露
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 权限策略：禁用不需要的浏览器功能
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy
    # Quartz 需要加载内联脚本（SPA）、Google Fonts、KaTeX 等
    # 根据实际报错调整，开发时可先用 Content-Security-Policy-Report-Only
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # -------------------- 隐藏版本号 --------------------
    # 也可以在 nginx.conf 的 http 块中全局设置
    server_tokens off;

    # -------------------- 日志 --------------------
    access_log /var/log/nginx/cs-notes-access.log;
    error_log  /var/log/nginx/cs-notes-error.log;

    # -------------------- 根目录 --------------------
    root /var/www/cs-notes;  # 静态文件部署目录
    index index.html;

    # -------------------- Gzip 压缩 --------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;           # 压缩级别 1-9，6 是性价比最优
    gzip_min_length 256;         # 小于 256 字节不压缩
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/manifest+json
        application/vnd.ms-fontobject
        font/opentype
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/cache-manifest
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # -------------------- 限流 --------------------
    # 通用限流：每个 IP 每秒 10 个请求，允许突发 20 个
    # 注意：limit_req_zone 需在 nginx.conf 的 http 块中定义
    limit_req zone=general burst=20 nodelay;

    # 并发连接限制：每个 IP 最多 20 个并发连接
    limit_conn conn_limit 20;

    # -------------------- 敏感路径访问控制 --------------------
    # 禁止访问 .git 等版本控制目录
    location ~ /\.git {
        deny all;
        return 404;
    }

    # 禁止访问其他隐藏文件
    location ~ /\. {
        deny all;
        return 404;
    }

    # -------------------- 考试资料保护（可选） --------------------
    # 如需限制 sys-analyst 和 sys-architect 目录的访问
    # 方案一：IP 白名单（推荐）
    # location ^~ /sys-analyst/ {
    #     allow 1.2.3.4;        # 替换为你的 IP
    #     allow 192.168.0.0/16; # 内网
    #     deny all;
    #     try_files $uri $uri/ /index.html;
    # }
    #
    # location ^~ /sys-architect/ {
    #     allow 1.2.3.4;
    #     allow 192.168.0.0/16;
    #     deny all;
    #     try_files $uri $uri/ /index.html;
    # }

    # 方案二：HTTP Basic Auth（取消注释启用）
    # 需先创建密码文件：sudo htpasswd -c /etc/nginx/.htpasswd csadmin
    # location ^~ /sys-analyst/ {
    #     auth_basic "Restricted Area";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     try_files $uri $uri/ /index.html;
    # }
    #
    # location ^~ /sys-architect/ {
    #     auth_basic "Restricted Area";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     try_files $uri $uri/ /index.html;
    # }

    # -------------------- 静态资源缓存 --------------------
    # Quartz 构建的静态资源带有 hash 文件名，可长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 静态资源限流放宽
        limit_req zone=static burst=50 nodelay;
        # 重新添加安全头（expires 会覆盖之前的 add_header）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # -------------------- 防盗链（可选） --------------------
    # 防止其他网站直接引用本站图片和字体资源
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        valid_referers none blocked server_names *.your-domain.com your-domain.com;
        if ($invalid_referer) {
            return 403;
        }
        try_files $uri =404;
    }

    # -------------------- SPA 路由支持 --------------------
    # Quartz 启用了 SPA 模式，所有未匹配的路径需回退到 index.html
    location / {
        # 先尝试精确匹配文件、目录，最后回退到 index.html
        try_files $uri $uri/ /index.html;
    }

    # -------------------- robots.txt 和 sitemap --------------------
    # 确保 robots.txt 和 sitemap 可正常访问
    location = /robots.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files $uri =404;
    }

    # -------------------- RSS Feed --------------------
    location = /index.xml {
        default_type application/xml;
        try_files $uri =404;
    }

    # -------------------- 404 页面 --------------------
    error_page 404 /404.html;
    location = /404.html {
        internal;
        try_files $uri /index.html;
    }

    # -------------------- 禁止目录列表 --------------------
    autoindex off;
}
