# Site settings
title: "全栈学习笔记"
description: "一个系统化的计算机科学与全栈开发知识库"
author: "dukechase"
lang: zh-CN

# URL settings
url: "https://dukechase.github.io"
baseurl: "/cs_notes"

# Build settings
markdown: kramdown
remote_theme: just-the-docs/just-the-docs

# Plugins
plugins:
  - jekyll-remote-theme

# Just the Docs theme settings
color_scheme: light
favicon_ico: "/favicon.svg"
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation settings
nav_sort: order
nav_excluded_files:
  - index.md
  - README.md
  - LICENSE

# Aux links (header links)
aux_links:
  "GitHub 仓库":
    - "//github.com/dukechase/cs_notes"

# Footer content
footer_content: "Copyright &copy; 2024 dukechase. Distributed under the <a href=\"https://github.com/dukechase/cs_notes/blob/master/LICENSE\">MIT license.</a>"

# Default layout
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Files to exclude from build
exclude:
  - .git/
  - .obsidian/
  - .github/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - LICENSE
  - README.md
  - todo.md
  - AGENTS.md
  - QWEN.md
  - "*.skill"
  - Clippings/
  - copilot/